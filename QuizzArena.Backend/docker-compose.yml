# USAGE:
# GPU Mode:   docker compose --profile gpu up -d
# CPU Mode:   docker compose --profile cpu up -d

services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: quizarena_backend
    environment:
      # Run in Development so EF Core migrations are applied on startup and Swagger is served.
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      # Backing services resolved by their compose service names.
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__AzureBlobStorage: "UseDevelopmentStorage=true;DevelopmentStorageProxyUri=http://azurite"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      TranscriptionSettings__BaseUrl: "http://whisper:9000/"
      TextGenerationSettings__BaseUrl: "http://ollama:11434/"
      EmbeddingSettings__BaseUrl: "http://ollama:11434/"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      azurite:
        condition: service_started
      ollama-cpu:
        condition: service_started
        required: false
      ollama-gpu:
        condition: service_started
        required: false
      whisper-cpu:
        condition: service_started
        required: false
      whisper-gpu:
        condition: service_started
        required: false
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    container_name: quizarena_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: quizarena_rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama-cpu:
    image: ollama/ollama:latest
    container_name: quizarena_ollama
    profiles: ["cpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      default:
        aliases:
          - ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  ollama-gpu:
    image: ollama/ollama:latest
    container_name: quizarena_ollama
    profiles: ["gpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      default:
        aliases:
          - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: ${GPU_DRIVER:-nvidia}
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: quizarena_azurite
    command: azurite --skipApiVersionCheck --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    restart: unless-stopped

  whisper-cpu:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: quizarena_whisper
    profiles: ["cpu"]
    environment:
      ASR_MODEL: ${WHISPER_MODEL:-base}
      ASR_ENGINE: openai_whisper
    volumes:
      - whisper_models:/root/.cache/whisper
    ports:
      - "9000:9000"
    networks:
      default:
        aliases:
          - whisper
    restart: unless-stopped

  whisper-gpu:
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    container_name: quizarena_whisper
    profiles: ["gpu"]
    environment:
      ASR_MODEL: ${WHISPER_MODEL:-base}
      ASR_ENGINE: openai_whisper
    volumes:
      - whisper_models:/root/.cache/whisper
    deploy:
      resources:
        reservations:
          devices:
            - driver: ${GPU_DRIVER:-nvidia}
              count: all
              capabilities: [gpu]
    ports:
      - "9000:9000"
    networks:
      default:
        aliases:
          - whisper
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_models:
  whisper_models:
  azurite_data: