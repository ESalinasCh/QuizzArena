name: Build and test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      HUSKY: 0

    defaults:
      run:
        working-directory: QuizzArena.Backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Verify formatting
        run: dotnet format QuizzArena.Backend.slnx --severity warn --verify-no-changes --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

      - name: Publish release artifact
        run: dotnet publish Host/Host.csproj -c Release -o ../publish --no-restore /p:UseAppHost=false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quizzarena-backend-publish
          path: publish/
          if-no-files-found: error

  docker:
    # Publish an image only when changes land on a tracked branch, not on PRs.
    if: github.event_name == 'push'
    needs: build-and-test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-backend" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
